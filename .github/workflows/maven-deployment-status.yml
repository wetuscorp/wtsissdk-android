name: Maven Deployment Status

on:
  workflow_dispatch:
    inputs:
      deployment_id:
        description: Central Portal deployment ID
        required: true
        type: string

permissions:
  contents: read

jobs:
  status:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Query Central Portal deployment
        env:
          CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          DEPLOYMENT_ID: ${{ inputs.deployment_id }}
        run: |
          set -euo pipefail
          test -n "$CENTRAL_USERNAME"
          test -n "$CENTRAL_PASSWORD"
          test -n "$DEPLOYMENT_ID"

          central_auth="$(printf '%s:%s' "$CENTRAL_USERNAME" "$CENTRAL_PASSWORD" | base64 | tr -d '\n')"
          status_response="$(
            curl --silent --show-error \
              --request POST \
              --write-out $'\n%{http_code}' \
              --header "Authorization: Bearer $central_auth" \
              --data-urlencode "id=$DEPLOYMENT_ID" \
              https://central.sonatype.com/api/v1/publisher/status
          )"

          http_status="${status_response##*$'\n'}"
          response_body="${status_response%$'\n'*}"
          printf 'Central HTTP status: %s\n' "$http_status"

          if jq --exit-status . >/dev/null 2>&1 <<<"$response_body"; then
            case "$http_status" in
              2??) printf '%s' "$response_body" | jq '{deploymentId, deploymentState, errors}' ;;
              *) printf '%s' "$response_body" | jq . ;;
            esac
          else
            printf 'Central response: %s\n' "$response_body"
          fi

          case "$http_status" in
            2??) ;;
            *) exit 1 ;;
          esac
