name: CI
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with: { distribution: temurin, java-version: '17' }
      - uses: gradle/actions/setup-gradle@v6
      - run: chmod +x gradlew scripts/verify-contracts.sh scripts/verify-release-workflow.sh && scripts/verify-contracts.sh && scripts/verify-release-workflow.sh
      - run: ./gradlew :sdk:testDebugUnitTest :sdk:lintDebug :sample:assembleDebug :sdk:publishToMavenLocal
